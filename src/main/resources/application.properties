# --- Twitter API credentials (OAuth 1.0a) ---
# Get these credentials from https://developer.twitter.com/en/portal/dashboard
# For local dev: copy application-local.properties.example -> application-local.properties and fill in the values
twitter.api-key=${TWITTER_API_KEY}
twitter.api-secret=${TWITTER_API_SECRET}
twitter.access-token=${TWITTER_ACCESS_TOKEN}
twitter.access-token-secret=${TWITTER_ACCESS_TOKEN_SECRET}



# --- Test tweet manual (true solo para probar escritura) ---
twitter.test-tweet.enabled=false

# --- Scheduler (deshabilitado: GitHub Actions dispara la app directamente) ---
tweet.schedule.enabled=false
tweet.schedule.cron=0 0 3 * * *
tweet.schedule.timezone=America/Mexico_City

# --- Logging ---
logging.level.com.raffenio=INFO
logging.level.twitter4j=WARN

spring.main.banner-mode=off